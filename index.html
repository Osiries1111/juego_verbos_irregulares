<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Juego de Verbos Irregulares</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <span class="deco d1">🌸</span>
  <span class="deco d2">☁️</span>
  <span class="deco d3">✨</span>
  <span class="deco d4">🩵</span>
  <span class="deco d5">💗</span>
  <span class="deco d6">⭐</span>

  <div class="tarjeta">
    <h1>Juego de Verbos Irregulares</h1>
    <p class="subtitulo">¡Completa la forma correcta del verbo! 🐰</p>

    <div id="config">
      <div class="campo-config">
        <label>¿Cuántas preguntas quieres practicar?</label>
        <div class="opciones-cantidad" id="opcionesCantidad">
          <button type="button" class="opcion-cantidad" data-valor="5">5</button>
          <button type="button" class="opcion-cantidad seleccionada" data-valor="10">10</button>
          <button type="button" class="opcion-cantidad" data-valor="15">15</button>
          <button type="button" class="opcion-cantidad" data-valor="20">20</button>
        </div>
        <div class="cantidad-personalizada">
          <span>u otra cantidad:</span>
          <input type="number" id="cantidadPersonalizada" min="1" max="50" placeholder="Ej: 8" />
        </div>
      </div>
      <button id="btnComenzar">Comenzar 🌟</button>
    </div>

    <div id="juego" style="display: none;">
      <div id="progreso"></div>
      <p id="pregunta"></p>
      <input type="text" id="respuesta" placeholder="Tu respuesta aquí" autocomplete="off" />
      <button id="btnVerificar">Verificar ✓</button>
      <div id="resultado"></div>
    </div>

    <div id="final" style="display: none;">
      <span class="emoji-final">🎉</span>
      <h2 id="mensaje-final"></h2>

      <div class="resumen">
        <h3>✅ Respuestas correctas</h3>
        <ul class="lista-resumen" id="listaCorrectas"></ul>
        <h3>❌ Respuestas incorrectas</h3>
        <ul class="lista-resumen" id="listaIncorrectas"></ul>
      </div>

      <button id="btnReiniciar">Jugar otra vez 🔄</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
