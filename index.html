<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Juego de Verbos Irregulares</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <span class="deco d1">🌸</span>
  <span class="deco d2">☁️</span>
  <span class="deco d3">✨</span>
  <span class="deco d4">🩵</span>
  <span class="deco d5">💗</span>
  <span class="deco d6">⭐</span>

  <div class="tarjeta">
    <h1>Juego de Verbos Irregulares</h1>
    <p class="subtitulo">¡Completa la forma correcta del verbo! 🐰</p>

    <!-- ============ CONFIGURACIÓN ============ -->
    <div id="config">

      <div class="campo-config">
        <label>¿Qué modo quieres jugar?</label>
        <div class="opciones-modo" id="opcionesModo">
          <button type="button" class="opcion-modo seleccionada" data-modo="quiz">🎯 Quiz rápido</button>
          <button type="button" class="opcion-modo" data-modo="fila">📝 Completar fila</button>
        </div>
      </div>

      <!-- Quiz rápido: elegir columnas a practicar (multi-select) -->
      <div class="campo-config" id="bloqueColumnasQuiz">
        <label>¿Qué quieres practicar escribir?</label>
        <div class="opciones-columnas" id="opcionesColumnasQuiz">
          <button type="button" class="opcion-columna seleccionada" data-col="0">Infinitive</button>
          <button type="button" class="opcion-columna seleccionada" data-col="1">Simple Past</button>
          <button type="button" class="opcion-columna seleccionada" data-col="2">Past Participle</button>
          <button type="button" class="opcion-columna seleccionada" data-col="3">Castellano</button>
        </div>
        <span class="ayuda-config">Elige una o más — la pista saldrá al azar entre las otras columnas</span>
      </div>

      <!-- Completar fila: elegir la columna que ya se sabe (single-select) -->
      <div class="campo-config" id="bloqueColumnaFila" style="display:none;">
        <label>¿Qué columna ya te sabes?</label>
        <div class="opciones-columnas" id="opcionesColumnaFila">
          <button type="button" class="opcion-columna seleccionada" data-col="0">Infinitive</button>
          <button type="button" class="opcion-columna" data-col="1">Simple Past</button>
          <button type="button" class="opcion-columna" data-col="2">Past Participle</button>
          <button type="button" class="opcion-columna" data-col="3">Castellano</button>
        </div>
        <span class="ayuda-config">Se te mostrará esa columna y completarás las otras 3</span>
      </div>

      <div class="campo-config">
        <label>¿Cuántos verbos quieres practicar?</label>
        <div class="opciones-cantidad" id="opcionesCantidad">
          <button type="button" class="opcion-cantidad" data-valor="5">5</button>
          <button type="button" class="opcion-cantidad seleccionada" data-valor="10">10</button>
          <button type="button" class="opcion-cantidad" data-valor="15">15</button>
          <button type="button" class="opcion-cantidad" data-valor="20">20</button>
        </div>
        <div class="cantidad-personalizada">
          <span>u otra cantidad:</span>
          <input type="number" id="cantidadPersonalizada" min="1" max="50" placeholder="Ej: 8" />
        </div>
      </div>

      <button id="btnComenzar">Comenzar 🌟</button>
    </div>

    <!-- ============ MODO QUIZ RÁPIDO ============ -->
    <div id="juegoQuiz" style="display: none;">
      <div id="progresoQuiz" class="barra-progreso"></div>
      <p id="pregunta"></p>
      <input type="text" id="respuesta" placeholder="Tu respuesta aquí" autocomplete="off" />
      <button id="btnVerificar">Verificar ✓</button>
      <div id="resultado"></div>
    </div>

    <!-- ============ MODO COMPLETAR FILA ============ -->
    <div id="juegoFila" style="display: none;">
      <div id="progresoFila" class="barra-progreso"></div>

      <div class="fila-dada">
        <span class="fila-dada-etiqueta" id="filaDadaEtiqueta"></span>
        <span class="fila-dada-valor" id="filaDadaValor"></span>
      </div>

      <div class="campos-fila" id="camposFila"></div>

      <button id="btnVerificarFila">Verificar fila ✓</button>
      <div id="resultadoFila"></div>
    </div>

    <!-- ============ PANTALLA FINAL ============ -->
    <div id="final" style="display: none;">
      <span class="emoji-final">🎉</span>
      <h2 id="mensaje-final"></h2>

      <div class="resumen">
        <h3>✅ Respuestas correctas</h3>
        <ul class="lista-resumen" id="listaCorrectas"></ul>
        <h3>❌ Respuestas incorrectas</h3>
        <ul class="lista-resumen" id="listaIncorrectas"></ul>
      </div>

      <button id="btnReiniciar">Jugar otra vez 🔄</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
